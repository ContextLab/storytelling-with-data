name: Deploy Course Site to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'slides/**'
      - 'assignments/**'
      - 'data/**'
      - 'pages/**'
      - 'css/**'
      - 'scripts/**'
      - 'index.html'
      - 'admin/**'
      - '.github/workflows/deploy-site.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect changes

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/*.py') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-marp
          restore-keys: npm-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Cache compiled slides
        uses: actions/cache@v4
        with:
          path: |
            slides/*.html
            slides/*.pdf
            slides/themes/
            slides/images/
          key: slides-${{ hashFiles('slides/*.md') }}
          restore-keys: slides-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libcairo2-dev ffmpeg

      - name: Install dependencies
        run: |
          pip install cdl-slides pyyaml playwright
          npm install -g @marp-team/marp-cli
          playwright install chromium

      - name: Compile slides (incremental)
        run: |
          echo "Compiling slide decks (incremental)..."
          chmod +x scripts/build-slides.sh

          # Detect which slide .md files changed since last commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'slides/*.md' 2>/dev/null || echo "")

          # Also check for workflow or script changes that require full rebuild
          INFRA_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'scripts/build-slides.sh' '.github/workflows/deploy-site.yml' 2>/dev/null || echo "")

          if [ -n "$INFRA_CHANGED" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Infrastructure changed or manual trigger — full rebuild"
            ./scripts/build-slides.sh || echo "Warning: Some slides failed to compile"
          elif [ -z "$CHANGED" ]; then
            echo "No slide sources changed — checking for missing HTML..."
            # Still compile any slides that don't have HTML yet
            for md in slides/*.md; do
              [ "$md" = "slides/README.md" ] && continue
              html="${md%.md}.html"
              if [ ! -f "$html" ]; then
                echo "Missing HTML for $(basename $md) — compiling"
                ./scripts/build-slides.sh "$md" || echo "Warning: Failed to compile $md"
              fi
            done
            echo "Incremental check complete"
          else
            echo "Changed slides: $CHANGED"
            for md in $CHANGED; do
              if [ -f "$md" ] && [ "$md" != "slides/README.md" ]; then
                echo "Compiling changed: $md"
                ./scripts/build-slides.sh "$md" || echo "Warning: Failed to compile $md"
              fi
            done
            # Also compile any slides missing HTML (new files)
            for md in slides/*.md; do
              [ "$md" = "slides/README.md" ] && continue
              html="${md%.md}.html"
              if [ ! -f "$html" ]; then
                echo "Missing HTML for $(basename $md) — compiling"
                ./scripts/build-slides.sh "$md" || echo "Warning: Failed to compile $md"
              fi
            done
          fi

      - name: Generate index.html from outline
        run: python scripts/build-index.py

      - name: Build course pages
        run: |
          echo "Building HTML pages from markdown..."
          python scripts/build-pages.py

      - name: Build data story gallery
        run: |
          echo "Generating data story gallery..."
          python scripts/build-gallery.py

      - name: Build assignment PDFs
        run: |
          echo "Converting assignments to PDF..."
          python scripts/build-pdfs.py || echo "Warning: Some PDFs failed to generate"

      - name: Validate build
        run: |
          echo "Validating build output..."

          for f in index.html css/base-styles.css css/site-styles.css; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
          done

          for p in pages/assignments.html pages/stories.html pages/syllabus.html; do
            if [ ! -f "$p" ]; then
              echo "ERROR: Missing generated page: $p"
              exit 1
            fi
          done

          echo "Validation passed!"

      - name: Assemble site
        run: |
          mkdir -p _site/css
          mkdir -p _site/pages
          mkdir -p _site/slides/figs
          mkdir -p _site/slides/themes
          mkdir -p _site/slides/images
          mkdir -p _site/assignments
          mkdir -p _site/admin
          mkdir -p _site/data-stories/demo

          # Root files
          cp index.html _site/
          touch _site/.nojekyll

          # CSS
          cp css/*.css _site/css/

          # Pages (spoke pages)
          cp pages/*.html _site/pages/

          # Slides (compiled HTML + figures + theme assets)
          cp -a slides/figs/. _site/slides/figs/ 2>/dev/null || true
          cp -a slides/themes/. _site/slides/themes/ 2>/dev/null || true
          cp -a slides/images/. _site/slides/images/ 2>/dev/null || true
          for f in slides/*.html; do
            [ -f "$f" ] && cp "$f" _site/slides/
          done

          # Assignments (HTML + PDF + data)
          for dir in assignments/*/; do
            dirname=$(basename "$dir")
            mkdir -p "_site/assignments/$dirname"
            cp "$dir"index.html "_site/assignments/$dirname/" 2>/dev/null || true
            cp "$dir"*.pdf "_site/assignments/$dirname/" 2>/dev/null || true
          done

          # Admin (syllabus PDF)
          cp admin/*.pdf _site/admin/ 2>/dev/null || true

          # Data stories demo template
          cp data-stories/demo/README.md _site/data-stories/demo/ 2>/dev/null || true

          echo "Site assembled in _site/"
          find _site -type f | wc -l | xargs echo "Total files:"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
